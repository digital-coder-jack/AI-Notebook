# =====================================================================
#  Study Sphere AI  -  Nixpacks build config (Railway / Nixpacks)
# =====================================================================
[phases.setup]
# Python 3.11 so all wheels are pre-built (no Rust/cargo source builds).
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip",
  ". /opt/venv/bin/activate && pip install -r requirements.txt",
]

[start]
cmd = "gunicorn backend.main:app -k uvicorn.workers.UvicornWorker -w 2 -b 0.0.0.0:$PORT --timeout 120"

[variables]
PYTHON_VERSION = "3.11"
NIXPACKS_PYTHON_VERSION = "3.11"
