# =====================================================================
#  Study Sphere AI  -  Render deployment blueprint
#  Docs: https://render.com/docs/blueprint-spec
#
#  Deploy: push this repo to GitHub, then in Render:
#    New +  ->  Blueprint  ->  pick this repo  ->  Apply.
#  Set the secret env vars (marked sync:false) in the Render dashboard.
#
#  IMPORTANT — Root Directory:
#    LEAVE THE RENDER "Root Directory" FIELD EMPTY (= repository root).
#    This codebase uses absolute imports (`from backend import ...`,
#    `from telegram_bot.bot import ...`) and the start command is
#    `backend.main:app`, so it MUST build from the repo root. Setting the
#    root directory to `backend` would break those imports.
#
#  Python version is forced THREE ways so Render cannot fall back to 3.14:
#    - runtime.txt        -> python-3.11.9
#    - .python-version    -> 3.11.9
#    - PYTHON_VERSION env  -> 3.11.9   (below; highest precedence)
# =====================================================================
services:
  - type: web
    name: study-sphere-ai
    runtime: python
    plan: starter            # "free" works too, but free has no persistent disk
    region: oregon           # change if you prefer another region
    branch: main
    rootDir: .               # repo root — required for `backend.main:app` imports
    buildCommand: "python -m pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "gunicorn backend.main:app -k uvicorn.workers.UvicornWorker -w 2 -b 0.0.0.0:$PORT --timeout 120"
    healthCheckPath: /api/health
    autoDeploy: true

    # Persistent disk so the SQLite database survives restarts/redeploys.
    # (Free plan does NOT support disks — remove this block on the free plan;
    #  data will then be ephemeral and reset on each deploy.)
    disk:
      name: study-sphere-data
      mountPath: /data
      sizeGB: 1

    envVars:
      - key: DB_PATH
        value: /data/study_sphere.db          # lives on the persistent disk
      - key: PYTHON_VERSION
        value: 3.11.9                          # FORCE Python 3.11 (wheels exist; no Rust build)
      - key: WEB_CONCURRENCY
        value: "2"

      # ----- Secrets: set these in the Render dashboard (sync:false) -----
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true                   # Render generates a strong secret
      - key: ALLOWED_ORIGINS
        sync: false                           # e.g. https://your-app.vercel.app
      - key: MONGODB_URI_WEB
        sync: false                           # MongoDB Atlas connection string
      - key: GROQ_MODEL
        sync: false                           # optional override
      - key: TELEGRAM_BOT_TOKEN
        sync: false                           # optional (bot)
      - key: WEBHOOK_SECRET
        sync: false                           # optional (bot)
      - key: TELEGRAM_ADMIN_ID
        sync: false                           # optional (analytics dashboard admin)
